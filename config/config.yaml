github:
  token: ""
  repo: "dkyazzentwatwa/flow-healer"

reminders:
  list_inactive: "dev-backlog"
  list_started: "dev-started"
  list_issue_ready: "dev-issue-ready"
  list_review: "dev-review"
  list_done: "dev-done"

notes:
  folder_name: "apple-git-logs"
  log_enabled: true

poll_interval_seconds: 15.0

db_path: ~/.apple-git/apple_git.sqlite

log_file: ~/.apple-git/apple-git.log

repo_path: ~/Documents/GitHub/flow-healer

connector_backend: kilo
connector_model: kilo/minimax/minimax-m2.5
